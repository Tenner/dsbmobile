###############################################################################
# DSBmobile Vertretungsplan – Beispiel Dashboard (Breitbild 1920x1200)
#
# Einrichtung:
#   1. In Home Assistant: Einstellungen → Dashboards → Dashboard hinzufügen
#   2. Dashboard öffnen → Drei Punkte → Raw-Konfigurationseditor
#   3. Diesen YAML-Inhalt einfügen
#   4. Entity-IDs anpassen (sensor.vertretungsplan_08b → deine Klasse)
#
# Voraussetzung:
#   - DSBmobile Integration v2.2+ installiert
#   - mushroom-cards (HACS) für Header/Status
#   - layout-card (HACS) für Grid-Layout
###############################################################################

title: Vertretungsplan
views:
  - title: Vertretungsplan
    icon: mdi:school
    path: vertretungsplan
    type: custom:grid-layout
    layout:
      grid-template-columns: 1fr 1fr 1fr
      grid-template-rows: auto auto
      grid-template-areas: |
        "header header header"
        "day1 day2 day3"
        "history history history"
      margin: 0
    cards:

      # ── Header (volle Breite) ────────────────────────────────────────
      - type: custom:mushroom-template-card
        view_layout:
          grid-area: header
        primary: |
          Vertretungsplan {{ state_attr('sensor.vertretungsplan_08b', 'class_filter') }}
        secondary: |
          {% set count = states('sensor.vertretungsplan_08b') | int(0) %}
          {% if count > 0 %}{{ count }} Vertretung{{ 'en' if count > 1 else '' }}{% else %}Keine Vertretungen — alles nach Plan{% endif %}
        icon: mdi:school
        icon_color: "{% if states('sensor.vertretungsplan_08b') | int(0) > 0 %}red{% else %}green{% endif %}"
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 50%, #1f3044 100%);
              border-radius: 20px;
              border: none;
              --primary-text-color: #ffffff;
              --secondary-text-color: rgba(255,255,255,0.6);
            }
            mushroom-state-info {
              --card-primary-font-size: 22px;
              --card-primary-font-weight: 700;
            }

      # ── Tag 1 (linke Spalte) ─────────────────────────────────────────
      - type: markdown
        view_layout:
          grid-area: day1
        content: |
          {% set entries = state_attr('sensor.vertretungsplan_08b', 'entries') %}
          {% if entries %}
          {% set days = entries | map(attribute='day') | unique | list %}
          {% if days | length > 0 %}
          ## 📅 {{ days[0] }}
          {% for e in entries if e.day == days[0] %}
          **{{ e.art }}** · {{ e.lesson }}. Std · {{ e.subject }}
          Raum: {{ e.room }}{% if e.text %} · _{{ e.text }}_{% endif %}

          ---
          {% endfor %}
          {% else %}
          _Keine Daten_
          {% endif %}
          {% else %}
          _Keine Vertretungen_
          {% endif %}

      # ── Tag 2 (mittlere Spalte) ─────────────────────────────────────
      - type: markdown
        view_layout:
          grid-area: day2
        content: |
          {% set entries = state_attr('sensor.vertretungsplan_08b', 'entries') %}
          {% if entries %}
          {% set days = entries | map(attribute='day') | unique | list %}
          {% if days | length > 1 %}
          ## 📅 {{ days[1] }}
          {% for e in entries if e.day == days[1] %}
          **{{ e.art }}** · {{ e.lesson }}. Std · {{ e.subject }}
          Raum: {{ e.room }}{% if e.text %} · _{{ e.text }}_{% endif %}

          ---
          {% endfor %}
          {% else %}
          _Kein weiterer Tag_
          {% endif %}
          {% else %}
          &nbsp;
          {% endif %}

      # ── Tag 3 (rechte Spalte) ───────────────────────────────────────
      - type: markdown
        view_layout:
          grid-area: day3
        content: |
          {% set entries = state_attr('sensor.vertretungsplan_08b', 'entries') %}
          {% if entries %}
          {% set days = entries | map(attribute='day') | unique | list %}
          {% if days | length > 2 %}
          ## 📅 {{ days[2] }}
          {% for e in entries if e.day == days[2] %}
          **{{ e.art }}** · {{ e.lesson }}. Std · {{ e.subject }}
          Raum: {{ e.room }}{% if e.text %} · _{{ e.text }}_{% endif %}

          ---
          {% endfor %}
          {% else %}
          _Kein weiterer Tag_
          {% endif %}
          {% else %}
          &nbsp;
          {% endif %}

      # ── Verlauf (volle Breite) ──────────────────────────────────────
      - type: history-graph
        view_layout:
          grid-area: history
        title: "📊 Verlauf (7 Tage)"
        hours_to_show: 168
        entities:
          - entity: sensor.vertretungsplan_08b
            name: Vertretungen
