###############################################################################
# DSBmobile Vertretungsplan – Beispiel Dashboard
#
# Einrichtung:
#   1. In Home Assistant: Einstellungen → Dashboards → Dashboard hinzufügen
#   2. Dashboard öffnen → Drei Punkte → Raw-Konfigurationseditor
#   3. Diesen YAML-Inhalt einfügen
#   4. Entity-IDs anpassen (sensor.vertretungsplan_08b → deine Klasse)
#
# Voraussetzung:
#   - DSBmobile Integration v2.2+ installiert
#   - Optional: mushroom-cards (HACS) für Header
###############################################################################

title: Vertretungsplan
views:
  - title: Vertretungsplan
    icon: mdi:school
    path: vertretungsplan
    cards:

      # ── Header ───────────────────────────────────────────────────────
      - type: custom:mushroom-template-card
        primary: |
          Vertretungsplan {{ state_attr('sensor.vertretungsplan_08b', 'class_filter') }}
        secondary: |
          {% set count = states('sensor.vertretungsplan_08b') | int(0) %}
          {% if count > 0 %}{{ count }} Vertretung{{ 'en' if count > 1 else '' }}{% else %}Keine Vertretungen{% endif %}
        icon: mdi:school
        icon_color: "{% if states('sensor.vertretungsplan_08b') | int(0) > 0 %}red{% else %}green{% endif %}"
        card_mod:
          style: |
            ha-card {
              background: linear-gradient(135deg, #0d1b2a 0%, #1b2838 50%, #1f3044 100%);
              border-radius: 20px;
              border: none;
              --primary-text-color: #ffffff;
              --secondary-text-color: rgba(255,255,255,0.6);
            }
            mushroom-state-info {
              --card-primary-font-size: 20px;
              --card-primary-font-weight: 700;
            }

      # ── Vertretungen nach Tag ────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.vertretungsplan_08b
            above: 0
        card:
          type: markdown
          content: |
            {% set entries = state_attr('sensor.vertretungsplan_08b', 'entries') %}
            {% if entries %}
            {% set days = entries | map(attribute='day') | unique | list %}
            {% for day in days %}
            ## 📅 {{ day }}
            {% for e in entries if e.day == day %}
            **{{ e.art }}** · {{ e.lesson }}. Stunde · {{ e.subject }}
            Raum: {{ e.room }}{% if e.text %} · _{{ e.text }}_{% endif %}

            ---
            {% endfor %}
            {% endfor %}
            {% endif %}

      # ── Alles normal ─────────────────────────────────────────────────
      - type: conditional
        conditions:
          - condition: numeric_state
            entity: sensor.vertretungsplan_08b
            below: 1
        card:
          type: custom:mushroom-template-card
          primary: Keine Vertretungen
          secondary: "Klasse {{ state_attr('sensor.vertretungsplan_08b', 'class_filter') }} — alles nach Plan"
          icon: mdi:check-circle
          icon_color: green

      # ── Verlauf ──────────────────────────────────────────────────────
      - type: history-graph
        title: "📊 Verlauf (7 Tage)"
        hours_to_show: 168
        entities:
          - entity: sensor.vertretungsplan_08b
            name: Vertretungen
